<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Vault - Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
</head>

<body>

    <main class="dashboard-container">
        <header class="dashboard-header">
            <h1>Media Vault</h1>
            <div id="health-status" class="status-indicator checking">
                <span class="status-dot"></span>
                <span id="status-text">Comprobando servidor...</span>
            </div>
        </header>

        <section class="actions-grid">
            <a href="random" style="text-decoration: none;">
                <button id="btn-random" class="btn btn-primary">
                    <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 3 21 3 21 8"></polyline>
                        <line x1="4" y1="20" x2="21" y2="3"></line>
                        <polyline points="21 16 21 21 16 21"></polyline>
                        <line x1="15" y1="15" x2="21" y2="21"></line>
                        <line x1="4" y1="4" x2="9" y2="9"></line>
                    </svg>
                    Reproducir Aleatoriamente
                </button>
            </a>
            <a href="favoritos" style="text-decoration: none;">
                <button id="btn-favorites" class="btn btn-accent">
                    <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polygon
                            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                        </polygon>
                    </svg>
                    Favoritos
                </button>
            </a>

            <button id="btn-trigger-nav-modal" class="btn btn-dark">
                <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                </svg>
                Álbumes y personas
            </button>

            <button id="btn-stats" class="btn btn-info">
                <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="20" x2="18" y2="10"></line>
                    <line x1="12" y1="20" x2="12" y2="4"></line>
                    <line x1="6" y1="20" x2="6" y2="14"></line>
                </svg>
                Stats
            </button>
            <div class="stats-actions" style="margin-top: 15px;">
                <button id="btn-pendientes" class="btn"
                    style="background-color: #f97316; color: white; display: flex; align-items: center; gap: 8px; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: background 0.2s;"
                    onclick="window.location.href='/pendientes'">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z">
                        </path>
                        <line x1="12" y1="9" x2="12" y2="13"></line>
                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                    Pendientes <span id="count-pendientes">(...)</span>
                </button>
            </div>
        </section>
    </main>
    <div id="nav-modal" class="modal-overlay hidden-modal">
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header">
                <h3>Explorar Catálogo</h3>
                <button id="nav-modal-close" class="btn-close-modal">&times;</button>
            </div>

            <div class="modal-body" style="padding: 30px 20px; gap: 16px;">
                <p style="color: #94a3b8; text-align: center; margin-top: 0; margin-bottom: 8px; font-size: 0.95rem;">
                    ¿Qué sección deseas gestionar o visualizar ahora?
                </p>

                <div class="nav-modal-grid">
                    <a href="/albumes" class="btn-nav-destination btn-nav-albums">
                        <span class="nav-icon">📁</span>
                        <span class="nav-text">Ver Álbumes</span>
                    </a>

                    <a href="/personas" class="btn-nav-destination btn-nav-personas">
                        <span class="nav-icon">👤</span>
                        <span class="nav-text">Ver Personas</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/index.js') }}"></script>
</body>

</html>
